server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip text assets so the site loads faster over slow networks
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # Long cache for hashed assets (Vite emits content-hashed filenames)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — every non-asset path returns index.html so React Router takes over
  location / {
    try_files $uri /index.html;
  }
}
