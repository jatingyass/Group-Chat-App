# Local dev stack: MySQL + MinIO (S3-compatible) + backend + frontend.
# `docker compose up --build` brings everything up; the React app is served on
# http://localhost:5173 and the API on http://localhost:5000.

services:
  mysql:
    image: mysql:8.4
    container_name: gca-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: group_chat
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
    ports:
      # Host port 3307 -> container port 3306 (port 3306 on host is taken by local MySQL)
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-papppass"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: gca-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Creates the bucket once MinIO is up.
  minio-init:
    image: minio/mc:latest
    container_name: gca-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/groupchat-app-files || true &&
      mc anonymous set download local/groupchat-app-files
      "

  backend:
    build: .
    container_name: gca-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      CORS_ORIGIN: http://localhost:5173
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: group_chat
      DB_USER: app
      DB_PASSWORD: apppass
      JWT_SECRET: dev_jwt_secret_replace_me_with_at_least_32_chars
      JWT_EXPIRES_IN: 7d
      STORAGE_DRIVER: local       # change to s3 to test against MinIO
      LOCAL_UPLOAD_PATH: /app/uploads
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: us-east-1
      AWS_BUCKET_NAME: groupchat-app-files
      AWS_S3_ENDPOINT: http://minio:9000
      AWS_S3_FORCE_PATH_STYLE: "true"
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000
    container_name: gca-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql_data:
  minio_data:
  uploads_data:
